services:
  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT}:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - educore-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-Dapi.port=${API_PORT}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT}:8080"
    volumes:
      - ./.env:/app/.env:ro
      - educore-data:/data

  matricula:
    build: .
    env_file: .env
    command: ["java", "-cp", "app.jar", "edu.uam.educore.socket.ServidorMatricula"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro
      - educore-data:/data

  reportes:
    build: .
    env_file: .env
    command: ["java", "-cp", "app.jar", "edu.uam.educore.socket.ServidorReportes"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro
      - educore-data:/data

volumes:
  educore-db-data:
  educore-data:
